- SymbolImportSpec:
    doc: |
        Import specification with fully resolved symbol references.
        
        Manages import statements and their resolved symbol paths for a scope.
        During linking, import statements are analyzed and their target symbols
        are resolved into structured paths, enabling efficient name lookup.
        
        Each imported identifier is mapped to its SymbolRefPath, which encodes
        the navigation steps from the current scope to the imported symbol.
        This allows the compiler to quickly resolve qualified names without
        repeated symbol searches.
        
        Attributes:
            imports: List of import statements from the source (physical AST)
            symtab: Maps imported names to their resolved symbol paths
        
        See Also:
            SymbolRefPath, PackageImportStmt, SymbolScope
    data:
    - imports:
      - type: list<P<PackageImportStmt>>
    - symtab:
      - type: map<string,UP<SymbolRefPath>>
      - is_ctor: false

