enums:
- SymbolRefPathElemKind:
  - ElemKind_ChildIdx    # Direct child by index in children list
  - ElemKind_ArgIdx      # Template/function argument by index
  - ElemKind_Inline      # Inline element (embedded definition)
  - ElemKind_ParamIdx    # Parameter by index
  - ElemKind_Super       # Reference to super/parent scope
  - ElemKind_TypeSpec    # Type specialization/instantiation
structs:
- SymbolRefPathElem:
    doc: |
        Single element in a symbol reference path.
        
        Represents one step in navigating from a symbol to another through
        the linked symbol tree structure. Used during name resolution to
        encode resolved references as structured paths.
        
        Attributes:
            kind: Type of path element (child, argument, parameter, etc.)
            idx: Index value specific to the kind (e.g., child index, arg position)
        
        See Also:
            SymbolRefPath, SymbolRefPathElemKind
    data:
    - kind: SymbolRefPathElemKind
    - idx: int32_t

classes:
- SymbolChild:
    doc: |
        Base class for all symbols in the fully-linked symbol tree.
        
        Represents a node in the post-linking symbol resolution tree, distinct from
        the physical AST. Extends ScopeChild with linking-specific metadata including
        a unique identifier and parent scope reference.
        
        The symbol tree is constructed during the linking phase after parsing, providing
        a logical view of declarations with resolved imports and type references.
        
        Attributes:
            id: Unique identifier for this symbol within the tree (-1 if unassigned)
            upper: Parent symbol scope in the linked tree hierarchy
        
        See Also:
            SymbolScope, SymbolChildrenScope, ScopeChild
    super: ScopeChild
    data: 
    - id:
      - type: int32_t
      - is_ctor: false
      - init: -1
    - upper:
      - type: P<SymbolScope>
      - is_ctor: false
      - init: 0
      - visit: false

- SymbolChildrenScope:
    doc: |
        Symbol node that contains child scopes and declarations.
        
        Extends SymbolChild to support hierarchical symbol structures with named
        scopes containing child elements. Forms the basis for namespaces, types,
        and other container-like constructs in the linked symbol tree.
        
        During linking, this class manages the collection of child declarations
        and provides the structure for symbol table lookups within a named scope.
        
        Attributes:
            name: Identifier for this scope (package, type, function name)
            children: List of child declarations and sub-scopes
            target: Reference to the original physical AST node being wrapped
        
        See Also:
            SymbolChild, SymbolScope, ScopeChild
    super: SymbolChild
    data:
    - name:
      - type: string
      - is_ctor: true
    - children: 
      - type: list<UP<ScopeChild>>
      - is_ctor: false
    - target: 
      - type: P<ScopeChild>
      - is_ctor: false
      - init: 0
      - visit: true

# Used to reference
- SymbolScopeRef:
    doc: |
        Lightweight reference to a symbol scope by name.
        
        Provides a named reference mechanism for symbols without duplicating
        the full scope structure. Used during linking to create references
        between scopes before full resolution is complete.
        
        Attributes:
            name: Identifier of the referenced scope
        
        See Also:
            SymbolScope, ScopeChild
    super: ScopeChild
    data:
    - name: string

- SymbolScope:
    doc: |
        Base class for a node in the fully-linked tree.
        
        Core infrastructure for the linked symbol tree, providing symbol table
        management, import resolution, and scope hierarchy. Extends SymbolChildrenScope
        with linking-specific features including name-to-index mappings and import chains.
        
        The symbol tree is constructed during the linking phase to merge declarations
        across compilation units, resolve imports, and create a unified namespace view.
        This is distinct from the physical AST which preserves source file structure.
        
        Attributes:
            symtab: Maps local identifiers to child indices for fast name lookup
            imports: Import specification linking this scope to other packages/symbols
            synthetic: True if this scope was compiler-generated (not in source)
            opaque: True if scope contents should be hidden from external access
        
        See Also:
            SymbolChildrenScope, RootSymbolScope, SymbolTypeScope, SymbolImportSpec
    super: SymbolChildrenScope
    data:
    - symtab: 
      - doc: |
          Maps between local item identifier and item child index
      - type: map<string,int32_t>
      - is_ctor: false
    - imports: 
      - type: UP<SymbolImportSpec>
      - is_ctor: false
    - synthetic:
      - type: bool
      - is_ctor: false
      - init: false
    - opaque:
      - type: bool
      - is_ctor: false
      - init: false

- RootSymbolScope:
    doc: |
        Root of a resolved symbol tree. Holds references to 
        the physical linked-together files in addition to the
        merged contents within the symbol tree.
        
        Serves as the top-level entry point for the fully-linked symbol database,
        managing the collection of compilation units and their cross-file dependencies.
        Maintains bidirectional reference tracking between files for incremental
        compilation and dependency analysis.
        
        The root scope bridges the physical file-based AST representation with the
        logical merged symbol namespace, enabling efficient multi-file symbol resolution.
        
        Attributes:
            units: List of compilation units (GlobalScope) linked into this tree
            filenames: Maps file IDs to their filesystem paths
            id2idx: Maps file IDs to their index in the units list
            fileOutRef: Outbound references from each unit (dependencies)
            fileInRef: Inbound references to each unit (dependents)
        
        See Also:
            SymbolScope, GlobalScope, SymbolImportSpec
    super: SymbolScope
    data:
      - units:
        - doc: |
            List of compilation units linked together in this symbol tree.
        - type: list<UP<GlobalScope>>
        - is_ctor: false
      - filenames:
        - doc: |
            Map of fileId (as specified by the file) to corresponding file path
            to the 
        - type: map<int32_t,string>
        - is_ctor: false
      - id2idx:
        - doc: |
            Map from fileId (as specified by the file) to index in the units list
        - type: map<int32_t,int32_t>
        - is_ctor: false
      - fileOutRef:
        - doc: |
            List of outbound refs from each unit
        - type: list<list<int32_t>>
        - is_ctor: false
      - fileInRef:
        - doc: |
            List of inbound refs to each unit
        - type: list<list<int32_t>>
        - is_ctor: false

- SymbolEnumScope:
    doc: |
        Symbol scope for enumeration type declarations.
        
        Represents an enum definition in the linked symbol tree, managing the
        namespace for enum items and their associated values. Provides symbol
        resolution for enum member access during type checking.
        
        The scope contains the enum's items as children, enabling qualified
        name lookup (e.g., MyEnum::ItemName) during compilation.
        
        See Also:
            SymbolScope, EnumDecl, EnumItem
    super: SymbolScope
    data: {}

