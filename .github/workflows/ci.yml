name: CI
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  ci-linux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
    - uses: actions/checkout@v4
    - name: Update Version
      run: |
        tag=$(git tag -l --contains HEAD)
        if [ -z "$tag" ]; then
          sed -i -e 's/SUFFIX = ".*"/SUFFIX = ".${{ github.run_id }}"/g' \
            python/pssparser/__version__.py
        fi
    - name: Install additional build dependencies
      run: |
        yum install -y libuuid-devel
        yum install -y java-11-openjdk-devel
        for py in cp39-cp39 cp310-cp310 cp311-cp311 cp312-cp312; do
          /opt/python/${py}/bin/python -m pip install ninja wheel cython
        done
    - name: Fetch source dependencies
      run: |
        export IVPM_PYTHON=/opt/python/cp39-cp39/bin/python
        ${IVPM_PYTHON} -m pip install ivpm twine auditwheel
        ${IVPM_PYTHON} -m ivpm update -j 1 -a
    - name: Build packages
      run: |
        mkdir build
        cd build
        cmake ..
        make
        make install
        cd ..
        packages/python/bin/python setup.py bdist_wheel
    - name: Audit Wheels
      run: |
        for whl in dist/*.whl; do
          [ -f "$whl" ] || break
          /opt/python/cp39-cp39/bin/auditwheel repair $whl
          rm $whl
        done
        if ls wheelhouse/*.whl 2>/dev/null | grep -q .; then
          cp wheelhouse/*.whl dist
        fi
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        /opt/python/cp39-cp39/bin/python -m twine upload dist/*.whl

  ci-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    container: quay.io/pypa/manylinux_2_28_aarch64
    steps:
    - uses: actions/checkout@v4
    - name: Update Version
      run: |
        tag=$(git tag -l --contains HEAD)
        if [ -z "$tag" ]; then
          sed -i -e 's/SUFFIX = ".*"/SUFFIX = ".${{ github.run_id }}"/g' \
            python/pssparser/__version__.py
        fi
    - name: Install additional build dependencies
      run: |
        yum install -y libuuid-devel
        yum install -y java-11-openjdk-devel
        for py in cp39-cp39 cp310-cp310 cp311-cp311 cp312-cp312; do
          /opt/python/${py}/bin/python -m pip install ninja wheel cython
        done
    - name: Fetch source dependencies
      run: |
        export IVPM_PYTHON=/opt/python/cp312-cp312/bin/python
        ${IVPM_PYTHON} -m pip install ivpm twine auditwheel
        ${IVPM_PYTHON} -m ivpm update -j 1 -a
    - name: Build packages
      run: |
        mkdir build
        cd build
        cmake ..
        make
        make install
        cd ..
        packages/python/bin/python setup.py bdist_wheel
    - name: Audit Wheels
      run: |
        for whl in dist/*.whl; do
          [ -f "$whl" ] || break
          /opt/python/cp312-cp312/bin/auditwheel repair $whl
          rm $whl
        done
        if ls wheelhouse/*.whl 2>/dev/null | grep -q .; then
          cp wheelhouse/*.whl dist
        fi
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        /opt/python/cp312-cp312/bin/python -m twine upload dist/*.whl

  ci-win32:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ilammy/msvc-dev-cmd@v1
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Update Version
      shell: bash
      run: |
        tag=$(git tag -l --contains HEAD)
        if [ -z "$tag" ]; then
          sed -i -e 's/SUFFIX = ".*"/SUFFIX = ".${{ github.run_id }}"/g' \
            python/pssparser/__version__.py
        fi
    - name: Install Packages
      run: |
        python -m pip install ivpm twine cython ninja wheel
        python -m ivpm update -j 1 -a
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -GNinja
        ninja
        ninja install
        cd ..
        packages\python\Scripts\python setup.py bdist_wheel
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      shell: bash
      run: |
        packages/python/Scripts/python -m twine upload dist/*.whl

  ci-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    - name: Update Version
      run: |
        tag=$(git tag -l --contains HEAD)
        if [ -z "$tag" ]; then
          sed -i '' -e 's/SUFFIX = ".*"/SUFFIX = ".${{ github.run_id }}"/g' \
            python/pssparser/__version__.py
        fi
    - name: Install Packages
      run: |
        python -m pip install ivpm twine cython ninja wheel cmake
        python -m ivpm update -j 1 -a
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -GNinja
        ninja
        ninja install
        cd ..
        packages/python/bin/python setup.py bdist_wheel
    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v')
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        packages/python/bin/python -m twine upload dist/*.whl

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Sphinx dependencies
      run: |
        python -m pip install sphinx sphinx-rtd-theme
    - name: Build Sphinx docs
      run: |
        sphinx-build -b html docs docs/_build/html
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/_build/html
