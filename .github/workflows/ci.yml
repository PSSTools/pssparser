        done
    - name: Fetch source dependencies
      run: |
        export IVPM_PYTHON=/opt/python/cp312-cp312/bin/python
        ${IVPM_PYTHON} -m pip install twine auditwheel build
        ${IVPM_PYTHON} -m ivpm update -j 1 -a
    - name: Build packages
      run: |
        export PATH=/opt/python/cp312-cp312/bin:$PATH
