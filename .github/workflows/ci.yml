  ci-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Stamp build version
      run: |
        sed -i '' 's/^SUFFIX = ""$/SUFFIX = ".'"$GITHUB_RUN_ID"'"/' python/pssparser/__version__.py
        grep '^SUFFIX = ' python/pssparser/__version__.py
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    - name: Install Packages
      run: |
        python -m pip install ivpm ivpm-build twine cython ninja wheel cmake build
        python -m ivpm update -j 1 -a
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -GNinja
        ninja
    - name: Build Python wheel
      run: |
        python -m build --wheel --no-isolation
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-macos
        path: dist/*.whl
        if-no-files-found: error
    - name: System test
      run: |
        python -m venv /tmp/test-venv
        source /tmp/test-venv/bin/activate
        pip install dist/*.whl
        python -c "from pssparser import Parser; p = Parser(); assert p.parses([('test.pss', 'component pss_top {}')]); print('System test PASSED')"

  publish:
    name: Publish to PyPI
    # Linux-only for now; add ci-macos here once macOS wheels are vetted.
    needs: [ci-linux, ci-linux-aarch64]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    steps:
    - name: Download Linux wheels
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: wheels-linux-*
        merge-multiple: true
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        packages-dir: dist
        skip-existing: true

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install Sphinx dependencies
      run: |
        python -m pip install sphinx sphinx-rtd-theme
    - name: Build Sphinx docs
      run: |
        sphinx-build -b html docs docs/_build/html
    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: docs/_build/html
