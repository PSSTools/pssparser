name: CI
on:
  - push
  - pull_request
  - workflow_dispatch
jobs:
  ci-linux:
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
    - uses: actions/checkout@v4
    - name: Stamp build version
      run: |
        sed -i 's/^SUFFIX = ""$/SUFFIX = ".'"$GITHUB_RUN_ID"'"/' python/pssparser/__version__.py
        grep '^SUFFIX = ' python/pssparser/__version__.py
    - name: Install additional build dependencies
      run: |
        yum install -y libuuid-devel
        yum install -y java-11-openjdk-devel
        for py in cp39-cp39 cp310-cp310 cp311-cp311 cp312-cp312 cp313-cp313 cp314-cp314; do
          /opt/python/${py}/bin/python -m pip install ninja wheel cython setuptools ivpm ivpm-build
        done
    - name: Fetch source dependencies
      run: |
        export IVPM_PYTHON=/opt/python/cp312-cp312/bin/python
        ${IVPM_PYTHON} -m pip install twine auditwheel build
        ${IVPM_PYTHON} -m ivpm update -j 1 -a
    - name: Build packages
      run: |
        export PATH=/opt/python/cp312-cp312/bin:$PATH
        mkdir build
        cd build
        cmake .. -GNinja
        ninja
    - name: Build Python wheels
      run: |
        for py in cp39-cp39 cp310-cp310 cp311-cp311 cp312-cp312 cp313-cp313 cp314-cp314; do
          /opt/python/${py}/bin/python -m pip install build
          /opt/python/${py}/bin/python -m build --wheel --no-isolation
        done
    - name: Audit Wheels
      run: |
        for whl in dist/*.whl; do
          [ -f "$whl" ] || continue
          /opt/python/cp312-cp312/bin/auditwheel repair $whl
          rm $whl
        done
        if ls wheelhouse/*.whl 2>/dev/null | grep -q .; then
          cp wheelhouse/*.whl dist
        fi
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-linux-x86_64
        path: dist/*.whl
        if-no-files-found: error
    - name: Run Python tests
      run: |
        for py in cp312-cp312 cp313-cp313; do
          /opt/python/${py}/bin/python -m pip install pytest dist/*${py%%-*}*.whl
          /opt/python/${py}/bin/python -m pytest tests/python -v --tb=short
        done
    - name: System test
      run: |
        /opt/python/cp313-cp313/bin/python -m venv /tmp/test-venv
        source /tmp/test-venv/bin/activate
        pip install dist/*cp313*.whl
        python -c "from pssparser import Parser; p = Parser(); assert p.parses([('test.pss', 'component pss_top {}')]); print('System test PASSED')"

