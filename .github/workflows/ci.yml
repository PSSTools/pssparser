      with:
        name: wheels-linux-aarch64
        path: dist/*.whl
        if-no-files-found: error
    - name: System test
      run: |
        /opt/python/cp313-cp313/bin/python -m venv /tmp/test-venv
        source /tmp/test-venv/bin/activate
        pip install dist/*cp313*.whl
        python -c "from pssparser import Parser; p = Parser(); assert p.parses([('test.pss', 'component pss_top {}')]); print('System test PASSED')"

